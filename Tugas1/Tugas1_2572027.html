<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran - 2572027</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" /> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> 
</head>
<body class="bg-light-subtle" >
    <div class="d-flex flex-column bg-primary text-center py-5 text-light mb-5">
        <h1 class="fw-bolder">Form Kehadiran</h1>
        <p>Angkatan XX</p>
    </div>

    <div class="card mx-3 p-3 shadow-sm mb-5">
        <h3 class="text-success fw-bolder">Detail Acara</h3>
        <div class="row">
            <div class="col">
                <div class="card d-flex flex-column p-3 text-center border-0">
                    <p class="text-secondary">Lokasi</p>
                    <p class="fw-bold">ADV 4</p>
                </div>
            </div>

            <div class="col">
                <div class="card d-flex flex-column p-3 text-center border-0">
                    <p class="text-secondary">Dresscode</p>
                    <p class="fw-bold">Sopan & Rapi</p>
                </div>
            </div>

            <div class="col">
                <div class="text-bg-success card d-flex flex-column p-3 text-center border-0">
                    <p>Waktu</p>
                    <p class="fw-bold">15:00 - 17:00</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-4">
                <div class="card p-3 shadow-sm border-0">
                    <form class="d-flex flex-column" id="formData">
                        <h3 class="fw-bolder mb-3">Konfirmasi Kehadiran</h3>
                        
                        <label for="name">Nama Lengkap</label>
                        <input type="text" placeholder="Masukkan nama" class="border p-2 m-2 rounded" id="name">

                        <label for="nrp">NRP</label>
                        <input type="number" placeholder="Masukkan NRP" class="border p-2 m-2 rounded" id="nrp">

                        <label for="email">Email</label>
                        <input type="email" placeholder="nama@maranatha.ac.id" class="border p-2 m-2 rounded" id="email">

                        <label for="phoneNumber">No Telepon</label>
                        <input type="number" placeholder="08xxxxxxxxx" class="border p-2 m-2 rounded" id="phoneNumber">

                        <label for="arrivalTime">Jam Kehadiran</label>
                        <input type="time" class="border p-2 m-2 rounded" id="arrivalTime">

                        <button type="submit" class="btn btn-primary mt-3">&#10003; Konfirmasi Kehadiran</button>
                    </form>
                </div>
            </div>
            <div class="col-8">
                <div class="card p-3 shadow-sm border-0" id="tabelKehadiran">
                    
                </div>
            </div>
        </div>
    </div>

<script>

    let dataPeserta = JSON.parse(localStorage.getItem("dataPeserta")) || []; 


    function sendToLocalStorage(){
        localStorage.setItem("dataPeserta", JSON.stringify(dataPeserta));
    }



    function hapusPeserta(index) {
        if(confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            dataPeserta.splice(index, 1); 
            sendToLocalStorage();         
            renderData();                 
        }
    }
    
    document.getElementById("formData").addEventListener("submit", function(event){
        event.preventDefault();
        


        const name = document.getElementById("name").value.trim();
        const nrp = document.getElementById("nrp").value.trim();
        const email = document.getElementById("email").value.trim();
        const phoneNumber = document.getElementById("phoneNumber").value.trim();
        const arrivalTimeVal = document.getElementById("arrivalTime").value; 
        
        if (name === "" || nrp === "" || email === "" || phoneNumber === "" || arrivalTimeVal === ""){
            alert("Semua field wajib diisi!");
            return;
        }
        
        let dataBaru = {
            name,
            nrp,
            email,
            phoneNumber,
            arrivalTimeVal
        };

        
        dataPeserta.push(dataBaru); 
        sendToLocalStorage();
        renderData();
        
        document.getElementById("formData").reset();
        
    });

    function renderData() {
        const container = document.getElementById("tabelKehadiran");
    
        let PesertaFIeld = `
            <div class="row d-flex">
                <div class="col-10"><h3 class="fw-bold text-success">Daftar Peserta</h3></div>
                <div class="col-2 text-end">
                    <p class="card text-center d-flex p-2 bg-primary text-light fw-bold" id="total">Total: ${dataPeserta.length}</p>
                </div>
            </div>
    
            <div class="row d-flex bg-info-subtle mx-1 p-2 fw-bold mb-2">
                <div class="col-2">Nama</div>
                <div class="col-2">NRP</div>
                <div class="col-4">Email</div>
                <div class="col-2">Telepon</div>
                <div class="col-1">Jam</div>
                <div class="col-1">Aksi</div>
            </div>
        `;
    
        dataPeserta.forEach((item, index) => {
            PesertaFIeld += `
                <div class="row d-flex mx-1 p-2 border-bottom align-items-center">
                    <div class="col-2">${item.name}</div>
                    <div class="col-2">${item.nrp}</div>
                    <div class="col-4 text-break">${item.email}</div>
                    <div class="col-2">${item.phoneNumber}</div>
                    <div class="col-1">${item.arrivalTimeVal}</div>
                    <div class="col-1">
                        <button type="button" class="btn btn-danger btn-sm" onclick="hapusPeserta(${index})">Hapus</button>
                    </div>
                </div>
            `;
        });
    
        container.innerHTML = PesertaFIeld;
    }

    renderData();
</script>
</body>
</html>
